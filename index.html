<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Radio fouedb Music</title>

<link rel="shortcut icon" href="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/favicon.ico" type="image/x-icon">
<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
<link rel="stylesheet" href="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/base-rfbm-3-v3.css?4.6.12">

<script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.4/howler.min.js"></script>
<script defer src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/scripts-rfbm-3-v3.js"></script>

</head>

<body>

    <div class="player">

    <!-- Toast Notification -->
    <div id="toast"></div>

    <!-- Album -->
    <div class="album-art">

        <img
            id="cover"
            class="songimg"
            src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/noalbum-white.png"
            alt="Album Art">

    </div>

    <!-- Metadata -->
    <div class="meta">

    <div id="title" class="title">
        Chargement...
    </div>

    <div id="artist" class="artist">
    </div>

    <div id="album" class="album">
    </div>

    </div>

    <!-- Progress -->
    <div class="progress-container">

    <div id="progressBar"></div>

    </div>

    <!-- Timer -->
    <div class="timer">

        <span id="elapsed">
            00:00
        </span>

        <span class="separator">
            /
        </span>

        <span id="duration">
            00:00
        </span>

    </div>

    <!-- LIVE + Codec -->
    <div class="stream-info">

    <div class="live-badge">

        <span class="live-dot"></span>

            LIVE

    </div>

    <div id="codecInfo">

            MP3 • 320 kbps

    </div>

    </div>

    <!-- Quality -->
    <div class="quality-switch">

        <button
            id="mp3Btn"
            class="quality-btn active">

            MP3

        </button>

        <button
            id="aacBtn"
            class="quality-btn">

            AAC

        </button>
        
        <button
            id="m4aBtn"
            class="quality-btn">

            M4A

        </button>

    </div>

    <!-- Controls -->
    <div class="controls">

        <button
            id="playBtn"
            class="control-btn play">

        <img
            id="playIcon"
            src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/play-rfbm.png"
            alt="Play">

    </button>

    <button
        id="stopBtn"
        class="control-btn stop">

        <img
            src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/stop-rfbm.png"
            alt="Stop">

    </button>

        <button
            id="muteBtn"
            class="control-btn mute">

        <img
            id="muteIcon"
            src="https://radiofouedbmusic.weebly.com/uploads/2/7/3/9/27392993/volume-rfbm.png"
            alt="Volume">

        </button>

    </div>

    <!-- Volume -->
    <div class="volume-container">

        <i class="fas fa-volume-up"></i>

        <input
            id="volume"
            type="range"
            min="0"
            max="100"
            value="80">

    </div>

    </div>

</body>

</html>
